[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA: all routes serve index.html
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# sw.js must never be cached by the browser — it must always be fetched fresh
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# manifest.json — short cache, correct MIME type
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"
    Content-Type  = "application/manifest+json"

# Icons — long-lived cache (content doesn't change)
[[headers]]
  for = "/icon-*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
